set timeout=3
set default=0

# Load graphics/font support for both BIOS and UEFI consoles
if loadfont /boot/grub/fonts/unicode.pf2; then
    insmod gfxterm
    set gfxmode=auto
    terminal_output gfxterm
fi

menuentry "AeroSLS — Single Level Storage OS" {
    insmod multiboot2
    multiboot2 /boot/my_sls_kernel.bin
    boot
}

menuentry "AeroSLS (serial debug)" {
    insmod multiboot2
    multiboot2 /boot/my_sls_kernel.bin
    boot
}
