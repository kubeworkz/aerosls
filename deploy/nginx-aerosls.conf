# AeroSLS — nginx reverse proxy config for aerosls.kubeworkz.io
# (Architectural Phase 5, docs/AeroSLS-Architectural-MVP-Roadmap-v0.1.md)
#
# Written for Dave's actual setup: nginx already runs in front of this
# domain, and Cloudflare (Full strict SSL mode) sits in front of that. Full
# strict means Cloudflare will only forward traffic to this origin if nginx
# presents a cert Cloudflare can verify -- a Cloudflare Origin CA cert is the
# standard, simplest way to satisfy that (free, no public ACME challenge
# needed, works even though this origin likely isn't reachable except
# through Cloudflare anyway).
#
# One-time setup for the Origin CA cert:
#   1. Cloudflare dashboard -> SSL/TLS -> Origin Server -> Create Certificate
#      (defaults are fine: RSA, 15-year validity, hostname list including
#      aerosls.kubeworkz.io)
#   2. Save the certificate it gives you to /etc/nginx/ssl/aerosls-origin.pem
#   3. Save the private key it gives you to /etc/nginx/ssl/aerosls-origin.key
#      (chmod 600 -- it's a private key)
#   4. Confirm Cloudflare SSL/TLS mode is "Full (strict)", not "Flexible" --
#      Flexible + this config would double-redirect/loop, since Flexible
#      means Cloudflare talks plain HTTP to origin and this config expects
#      to terminate TLS itself.
#
# Proxies to localhost:3001 (the kernel), not :3000 (the Node dev proxy) --
# confirmed while writing this phase that the kernel serves both the
# compiled-in Navigator SPA bundle (kernel/webapp_bundle.c, from `make
# bundle`) and /api/* itself on that port; :3000 is a local hot-reload dev
# convenience, never meant to be the public-facing backend. If your current
# config points at :3000, that's worth switching -- check with:
#   grep -n proxy_pass /etc/nginx/sites-enabled/*aerosls*
#
# No kernel code changes needed -- it keeps speaking plain HTTP behind this,
# same as every other phase in this roadmap left it doing.

server {
    listen 80;
    listen [::]:80;
    server_name aerosls.kubeworkz.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name aerosls.kubeworkz.io;

    ssl_certificate     /etc/nginx/ssl/aerosls-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/aerosls-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers -- the reverse-proxy layer is the natural place for
    # these, independent of anything in the kernel itself.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Rate limiting (the bonus named in this phase's original scope) --
    # nginx has this built in, no plugin needed (unlike Caddy). 10 req/s per
    # IP with a small burst; tune to taste once you have real traffic
    # patterns to look at.
    limit_req_zone $binary_remote_addr zone=aerosls_rl:10m rate=10r/s;

    location / {
        limit_req zone=aerosls_rl burst=20 nodelay;

        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CF-Connecting-IP is Cloudflare's own header carrying the real
        # client IP -- more reliable than X-Forwarded-For once Cloudflare
        # is in the path, since it can't be spoofed by anything upstream
        # of Cloudflare the way a client-supplied X-Forwarded-For could be.
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
    }

    access_log /var/log/nginx/aerosls-access.log;
    error_log  /var/log/nginx/aerosls-error.log;
}
